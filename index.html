<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Matriz de Futuros Pluriversales — Móvil Optimizado</title>
<style>
:root{
  --bg1:#05060a; --bg2:#071021; --accent1:#8fffd0; --accent2:#c9b7ff;
  --muted:#9fb0b8; --card: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.1);
}
*{box-sizing:border-box; transition: all 0.2s ease;}
body{
  margin:0; font-family: 'Inter', system-ui, sans-serif;
  background: radial-gradient(circle at 15% 10%, rgba(143,255,208,0.05) 0%, transparent 20%), linear-gradient(180deg,var(--bg1),var(--bg2));
  color:#e8f1f0; min-height:100vh; padding:15px; display:flex; flex-direction:column; align-items:center;
}
.header{text-align:center; margin-bottom:20px;}
.h1{font-weight:800; letter-spacing:2px; color:var(--accent1); font-size:20px; text-transform: uppercase;}

.app{ width:100%; max-width:1100px; display:flex; flex-direction:column; gap:15px; }

.current-box{
  background: rgba(255,255,255,0.02); border-radius:16px; padding:20px;
  border: 1px solid var(--border); backdrop-filter: blur(10px);
}
.narrative-box{
  font-size: 16px; line-height: 1.6; color: #cfe9df; font-style: italic;
  margin-bottom: 20px; padding: 15px; border-left: 3px solid var(--accent1); background: rgba(0,0,0,0.2);
  min-height: 80px; display: flex; align-items: center;
}

/* Botones arriba en móvil */
.controls{ 
  display:flex; gap:10px; justify-content:center; flex-wrap:wrap; 
  margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid var(--border);
}
.btn{
  background: linear-gradient(90deg,var(--accent1), var(--accent2));
  color:#03121a; border:none; padding:12px 20px; border-radius:999px;
  cursor:pointer; font-weight:700; text-transform: uppercase; font-size: 11px;
}
.btn.sec{ background: transparent; border: 1px solid var(--accent2); color: var(--accent2); }
.btn:active{ transform: scale(0.95); }

.dimgrid{
  display:grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap:10px;
}
.dim{
  background: var(--card); border-radius:10px; padding:12px; border: 1px solid var(--border);
}
.dim .label{ font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px;}
.dim .value{ font-size:14px; font-weight:600; color:#fff;}

.history-section{ margin-top: 30px; width: 100%; }
.history-title{ font-size: 13px; color: var(--accent1); text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px;}
.log-container{ display: flex; flex-direction: column; gap: 10px; }
.log-item{ 
    background: rgba(255,255,255,0.02); padding: 12px; border-radius: 8px; 
    border: 1px solid var(--border); font-size: 12px; line-height: 1.4;
}
.log-item b { color: var(--accent2); }

@media (max-width:600px){ 
  .dimgrid{ grid-template-columns: 1fr 1fr; } /* Dos columnas en celu para que no sea tan larga la lista */
  .btn{ flex: 1 1 45%; } /* Botones más anchos en celu */
}
</style>
</head>
<body>

<div class="header">
  <div class="h1">Matriz de Futuros</div>
</div>

<div class="app">
  <div class="current-box">
    <div class="narrative-box" id="narrativa">Presiona "Generar Nuevo" para comenzar la exploración...</div>
    
    <div class="controls">
      <button class="btn" onclick="generarTodo()">Generar Nuevo</button>
      <button class="btn sec" onclick="mutarParcial()">Mutar Parcial</button>
      <button class="btn sec" style="border-color: #fff; color: #fff;" onclick="guardarEnHistorial()">⭐ Guardar</button>
    </div>

    <div class="dimgrid" id="mainGrid"></div>

    <div class="history-section">
        <div class="history-title">Escenarios Guardados</div>
        <div id="logContainer" class="log-container">
            <div style="color: var(--muted); font-size: 11px;">No hay escenarios guardados.</div>
        </div>
    </div>
  </div>
</div>

<script>
const CATEGORIAS = {
  "Ontología": ["humano","posthumano","cyborg","inteligencia artificial","vegetal","animal","micelial","mineral","multiespecie","espiritual","híbrido bio-digital","colectivo distribuido"],
  "Cosmología": ["materialista","animista","espiritual","panpsíquica","simulacional","holográfica","multiversal","fractal","mitológica","cibernética","gondwánica","emergentista"],
  "Ecología": ["sintrópica","regenerativa","simbiótica","extractiva","de mestizaje biocultural","terraformada","rewilded","hiperartificial","metabólica","mutualista","parasitaria","de reparación"],
  "Tecnología": ["alta tecnología","baja tecnología","tecnología biodigital","tecnología de los comunes","tecnología viva","tecnología autónoma","tecnología invisible","tecnología ritual","tecnología prohibida","tecnología open source","tecnología ancestral","tecnología regenerativa"],
  "Organización social": ["comunal","cooperativa","algorítmica","corporativa","imperial","anarquista","tribal","post-estatal","federativa","teocrática","horizontal","confederal"],
  "Economía": ["capitalista","post-capitalista","economía del don","economía de datos","economía energética","economía circular","economía de subsistencia","economía cooperativa","economía de los cuidados","economía algorítmica","economía de abundancia","economía de escasez"],
  "Territorialidad": ["urbana","rural","selvática","oceánica","desértica","subterránea","orbital","archipelágica","nómada","planetaria","interplanetaria","virtual"],
  "Temporalidad": ["acelerada","lenta","cíclica","profunda (deep time)","anacrónica","eterno presente","retrofuturista","futuro permanente","tiempo fractal","tiempo reversible","tiempo suspendido","tiempo ritual"],
  "Epistemología": ["científica","algorítmica","colectiva","ancestral","chamánica","vegetal","artificial","ritual","experimental","empírica","intuitiva","distribuida"],
  "Comunicación": ["lenguaje verbal","comunicación química","telepática","algorítmica","vegetal","simbólica ritual","sensorial expandida","interfaz neuronal","holográfica","acústica","lumínica","gestual"],
  "Régimen de realidad": ["realista","onírico","mitológico","simulacional","alucinatorio","espiritual","híbrido físico-digital","ritual","ficcional consciente","hiperreal","metamórfico","espectral"],
  "Tipo de futuro": ["utópico","queer","indígena","afrodiaspórico","austral / gondwánico","pluriversal","solarpunk","biocéntrico","posthumano","regenerativo","de transición","heterotópico"]
};

let seleccionActual = {};
let haGenerado = false;

function initApp() {
  const grid = document.getElementById('mainGrid');
  grid.innerHTML = '';
  Object.keys(CATEGORIAS).forEach((cat) => {
    const div = document.createElement('div');
    div.className = 'dim';
    div.innerHTML = `<div class="label">${cat}</div><div class="value" id="val-${cat}">—</div>`;
    grid.appendChild(div);
  });
}

function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function generarTodo() {
  haGenerado = true;
  Object.keys(CATEGORIAS).forEach((cat) => {
    const val = rand(CATEGORIAS[cat]);
    seleccionActual[cat] = val;
    document.getElementById(`val-${cat}`).innerText = val;
  });
  construirNarrativa();
}

function mutarParcial() {
  if(!haGenerado) { generarTodo(); return; }
  const keys = Object.keys(CATEGORIAS);
  for(let j=0; j<3; j++){
    const randomKey = rand(keys);
    const val = rand(CATEGORIAS[randomKey]);
    seleccionActual[randomKey] = val;
    document.getElementById(`val-${randomKey}`).innerText = val;
  }
  construirNarrativa();
}

function construirNarrativa() {
  const s = seleccionActual;
  const n = `"En un futuro ${s['Tipo de futuro']}, la existencia se manifiesta a través de un ser ${s['Ontología']} en una territorialidad ${s['Territorialidad']}. Bajo una cosmología ${s['Cosmología']}, la sociedad se organiza de forma ${s['Organización social']}, mediada por una economía ${s['Economía']} y una temporalidad ${s['Temporalidad']}. Aquí, la realidad se percibe como algo ${s['Régimen de realidad']}."`;
  document.getElementById('narrativa').innerText = n;
}

function guardarEnHistorial() {
    if(!haGenerado) return;
    const container = document.getElementById('logContainer');
    if (container.innerHTML.includes("No hay escenarios")) container.innerHTML = "";

    const item = document.createElement('div');
    item.className = 'log-item';
    const resumen = `<b>${seleccionActual['Tipo de futuro'].toUpperCase()}</b>: ${seleccionActual['Ontología']} | ${seleccionActual['Territorialidad']}`;
    item.innerHTML = `<div>${resumen}</div><div style="margin-top:5px; font-size:10px; opacity:0.6;">${document.getElementById('narrativa').innerText}</div>`;
    
    container.prepend(item);
}

window.onload = initApp;
</script>

</body>
</html>
